<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#070b13">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Le Closing">
<link rel="manifest" href="manifest.webmanifest">
<title>LE CLOSING — deviens le directeur financier</title>
<style>
  :root{
    --bg:#070b13; --bg2:#0d1320; --bg3:#151d30; --line:#212b41;
    --txt:#e8ebf2; --dim:#8a94ab;
    --acc:#d6b25e; --accd:#a98c3f;
    --blue:#5b9cff; --ok:#1fc584; --bad:#f4506a; --purple:#a78bfa;
    --r:12px;
    --serif:Georgia,'Times New Roman',serif;
    --mono:ui-monospace,'SF Mono',Menlo,Consolas,monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;overscroll-behavior:none;
    background-image:linear-gradient(rgba(120,145,190,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(120,145,190,.035) 1px,transparent 1px);
    background-size:26px 26px;background-attachment:fixed}
  #app{max-width:520px;margin:0 auto;min-height:100%;display:flex;flex-direction:column}
  main{flex:1;padding:16px 16px 92px}
  header{padding:14px 16px 0;display:flex;align-items:center;justify-content:space-between}
  .logo{font-family:var(--serif);font-weight:700;font-size:19px;letter-spacing:2.5px}
  .logo span{color:var(--acc)}
  .hbadges{display:flex;gap:7px}
  .badge{font-family:var(--mono);font-weight:700;font-size:11.5px;background:var(--bg2);border:1px solid var(--line);padding:6px 10px;border-radius:8px;letter-spacing:.3px}
  .badge.gold{color:var(--acc);border-color:#453a20}

  #ticker{overflow:hidden;border-top:1px solid var(--line);border-bottom:1px solid var(--line);background:#050810;margin-top:12px}
  .tkwrap{display:inline-flex;white-space:nowrap;animation:tk 50s linear infinite;will-change:transform}
  .tkwrap span{padding:7px 20px 7px 0;font-family:var(--mono);font-size:10.5px;font-weight:600;letter-spacing:.6px;color:var(--dim)}
  .tkwrap b{color:var(--acc);font-weight:700}
  .tkwrap .up{color:var(--ok)} .tkwrap .dn{color:var(--bad)}
  @keyframes tk{to{transform:translateX(-50%)}}

  h1.page{font-family:var(--serif);font-size:23px;font-weight:700;letter-spacing:.3px;margin-bottom:4px}
  h2.sec{font-size:12px;text-transform:uppercase;letter-spacing:1.6px;color:var(--dim);margin:18px 0 8px;padding-left:2px;display:flex;align-items:center;gap:10px}
  h2.sec::after{content:"";flex:1;height:1px;background:linear-gradient(90deg,var(--line),transparent)}
  .sub{color:var(--dim);font-size:13px;margin-bottom:14px}
  .card{background:var(--bg2);border:1px solid var(--line);border-radius:var(--r);padding:16px;margin-bottom:12px}

  .hero{background:linear-gradient(135deg,#101528,#1b1710);border:1px solid #453a20;border-top:2px solid var(--acc);border-radius:var(--r);padding:16px;margin-bottom:12px;position:relative}
  .hero::after{content:"POSITION";position:absolute;top:10px;right:14px;font-family:var(--mono);font-size:9px;letter-spacing:2px;color:var(--dim);opacity:.7}
  .hero .rank{font-family:var(--serif);font-size:13px;letter-spacing:3px;text-transform:uppercase;color:var(--acc);font-weight:700}
  .hero .big{font-family:var(--mono);font-size:22px;font-weight:800;margin:3px 0 8px;font-variant-numeric:tabular-nums}
  .xpbar{height:9px;border-radius:2px;background:#0009;overflow:hidden;margin:6px 0 4px}
  .xpbar i{display:block;height:100%;background:linear-gradient(90deg,var(--accd),var(--acc));border-radius:2px;transition:width .4s}
  .xptxt{font-family:var(--mono);font-size:11px;color:var(--dim);letter-spacing:.2px}

  .coach{background:var(--bg2);border-left:3px solid var(--acc);border-radius:0 var(--r) var(--r) 0;padding:13px 14px;margin-bottom:12px;font-size:14px;line-height:1.5}
  .coach b{color:var(--acc)}

  .act{display:flex;align-items:center;gap:11px;background:var(--bg2);border:1px solid var(--line);border-radius:var(--r);padding:13px;margin-bottom:8px;cursor:pointer}
  .act:active{background:var(--bg3)}
  .act .ico{width:38px;height:38px;border-radius:11px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
  .act .t{flex:1;min-width:0}
  .act .t b{display:block;font-size:14px}
  .act .t small{color:var(--dim);font-size:12px;line-height:1.35;display:block;margin-top:1px}
  .act .st{font-size:18px;flex-shrink:0;color:var(--dim)}
  .act.done{opacity:.55}
  .act.done .st{color:var(--ok)}
  .act.rev{border-color:#3a3420}

  .tag{display:inline-block;font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;background:var(--bg3);color:var(--acc);border:1px solid #3d3626;padding:3px 8px;border-radius:5px;margin-right:6px}
  .tag.b{color:var(--blue);border-color:#1e2c4a}

  .btn{display:block;border:none;border-radius:12px;padding:13px 20px;font-size:15px;font-weight:700;cursor:pointer;background:var(--acc);color:#1a1300;width:100%;text-align:center;margin-top:12px}
  .btn:active{transform:scale(.97)}
  .btn.ghost{background:var(--bg3);color:var(--txt);border:1px solid var(--line)}
  .btn[disabled]{opacity:.4;pointer-events:none}

  #ov{position:fixed;inset:0;background:var(--bg);z-index:50;display:none;overflow-y:auto}
  #ov.on{display:block}
  #ov .inner{max-width:520px;margin:0 auto;padding:14px 16px 60px}
  #ov .top{display:flex;align-items:center;gap:10px;margin-bottom:14px;position:sticky;top:0;background:var(--bg);padding:8px 0;z-index:5}
  #ov .top .x{width:36px;height:36px;border-radius:11px;background:var(--bg2);border:1px solid var(--line);color:var(--txt);font-size:16px;cursor:pointer;flex-shrink:0}
  #ov .top b{font-family:var(--serif);font-size:17px;letter-spacing:.3px;flex:1}
  #ov .top .timer{font-family:var(--mono);font-size:15px;font-weight:800;color:var(--acc);background:var(--bg2);border:1px solid #453a20;padding:6px 11px;border-radius:8px;font-variant-numeric:tabular-nums}
  #ov .top .timer.low{color:var(--bad);border-color:#55232c}
  .story p{font-family:var(--serif);font-size:15.5px;line-height:1.72;color:#dde1ea;margin-bottom:14px}
  .meta{color:var(--dim);font-size:12.5px;margin-bottom:12px}

  .qq{font-size:16px;font-weight:700;line-height:1.45;margin-bottom:14px}
  .opt{display:block;width:100%;text-align:left;background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:13px;font-size:14px;line-height:1.4;color:var(--txt);margin-bottom:8px;cursor:pointer}
  .opt.ok{border-color:var(--ok);background:#10231a}
  .opt.ko{border-color:var(--bad);background:#2a151a}
  .opt[disabled]{cursor:default}
  .exp{background:var(--bg3);border-radius:12px;padding:12px;font-size:13.5px;line-height:1.5;color:#cfd3d9;margin:4px 0 8px;border-left:3px solid var(--acc)}
  .prog{font-family:var(--mono);font-size:11px;letter-spacing:.4px;color:var(--dim);margin-bottom:10px}

  textarea{width:100%;min-height:130px;background:var(--bg2);border:1px solid var(--line);border-radius:12px;color:var(--txt);padding:12px;font-size:14px;font-family:inherit;line-height:1.5;resize:vertical}
  textarea:focus{outline:none;border-color:var(--acc)}
  .gridpt{background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:12px 13px;font-size:13.5px;line-height:1.55;color:#d5d8dd;margin-bottom:8px}
  .gridpt b{color:var(--acc)}
  .selfrow{display:flex;gap:8px;margin-top:12px}
  .selfrow .btn{margin-top:0;font-size:13px;padding:12px 6px}
  .selfrow .r{background:#3a1a20;color:var(--bad)}
  .selfrow .m{background:var(--bg3);color:var(--txt);border:1px solid var(--line)}
  .selfrow .s{background:var(--ok);color:#02180b}
  .coachnote{background:#141625;border:1px solid #3d3626;border-radius:12px;padding:12px 13px;font-size:13.5px;line-height:1.55;margin-top:10px}
  .coachnote b{color:var(--acc)}

  .result{text-align:center;padding:26px 10px}
  .result .big{font-family:var(--mono);font-size:42px;font-weight:800;font-variant-numeric:tabular-nums}
  .result .xp{font-family:var(--mono);color:var(--acc);font-weight:800;font-size:15px;margin-top:6px}
  .result p{color:var(--dim);font-size:14px;margin-top:8px;line-height:1.5}

  nav{position:fixed;bottom:0;left:0;right:0;background:rgba(7,11,19,.95);backdrop-filter:blur(12px);border-top:1px solid var(--line);z-index:40}
  nav .in{max-width:520px;margin:0 auto;display:flex}
  nav button{flex:1;background:none;border:none;color:var(--dim);font-size:10.5px;font-weight:700;padding:9px 0 max(9px,env(safe-area-inset-bottom));cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px}
  nav button i{font-style:normal;font-size:19px}
  nav button.on{color:var(--acc)}

  .mod{display:flex;align-items:center;gap:11px;background:var(--bg2);border:1px solid var(--line);border-radius:var(--r);padding:13px;margin-bottom:8px;cursor:pointer}
  .mod .ico{font-size:22px}
  .mod .t{flex:1}
  .mod .t b{font-size:14.5px;display:block}
  .mod .t small{color:var(--dim);font-size:12px;line-height:1.35;display:block;margin-top:2px}
  .mod .pc{font-family:var(--mono);font-size:12px;font-weight:800;color:var(--acc)}
  .mod.gold{border-color:#3d3626;background:linear-gradient(135deg,#101526,#191712)}

  .ranks li{list-style:none;display:flex;justify-content:space-between;padding:9px 4px;border-bottom:1px solid var(--line);font-size:14px}
  .ranks li:last-child{border:none}
  .ranks li.cur{color:var(--acc);font-weight:800}
  .ranks li.past{color:var(--dim)}
  .ranks li small{color:var(--dim)}

  .statgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
  .stat{background:var(--bg2);border:1px solid var(--line);border-radius:var(--r);padding:13px;text-align:center}
  .stat b{font-family:var(--mono);font-size:21px;display:block;font-variant-numeric:tabular-nums}
  .stat small{font-family:var(--mono);color:var(--dim);font-size:10px;letter-spacing:.6px}
  .danger{color:var(--bad);background:none;border:1px solid #55232c;border-radius:12px;width:100%;padding:12px;font-size:13px;font-weight:700;cursor:pointer;margin-top:10px}

  .hm{display:grid;grid-auto-flow:column;grid-template-rows:repeat(7,12px);gap:3px;justify-content:start;margin-top:10px;overflow-x:auto;padding-bottom:4px}
  .hm i{width:12px;height:12px;border-radius:3px;background:var(--bg3)}
  .hm i.on{background:var(--acc)}
  .hm i.today{outline:1px solid var(--dim)}

  .search{width:100%;background:var(--bg2);border:1px solid var(--line);border-radius:12px;color:var(--txt);padding:11px 13px;font-size:14px;margin-bottom:12px}
  .search:focus{outline:none;border-color:var(--acc)}
  .lex{background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:11px 13px;margin-bottom:7px}
  .lex .h{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap}
  .lex .h b{font-size:14px}
  .lex .h .en{color:var(--blue);font-size:12px;font-style:italic}
  .lex .h .c{margin-left:auto;font-size:10px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:var(--dim)}
  .lex p{font-size:13px;color:#c8ccd2;line-height:1.5;margin-top:4px}

  #toast{position:fixed;left:50%;bottom:84px;transform:translateX(-50%) translateY(20px);background:#141625;border:1px solid #453a20;color:var(--txt);padding:12px 18px;border-radius:12px;font-size:14px;font-weight:600;z-index:60;opacity:0;pointer-events:none;transition:all .25s;max-width:90%;text-align:center}

  .cardbox{background:var(--bg2);border:1px solid var(--line);border-radius:18px;padding:28px 20px;min-height:220px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;margin-bottom:14px;animation:cardin .25s ease}
  @keyframes cardin{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
  .cardbox .side{font-size:10.5px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--acc);margin-bottom:12px}
  .cardbox .cardq{color:var(--dim);font-size:13px;font-weight:700;line-height:1.45;margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid var(--line);width:100%}
  .cardbox .txt{font-family:var(--serif);font-size:20px;font-weight:700;line-height:1.4}
  .cardbox .txt.def{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:15px;font-weight:400;line-height:1.6;color:#dde1ea;text-align:left}
  .cardbox .hint{color:var(--dim);font-size:12.5px;margin-top:14px}
  .raterow{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px}
  .raterow button{border:none;border-radius:12px;padding:14px 8px;font-size:13.5px;font-weight:700;cursor:pointer;color:var(--txt)}
  .raterow button:active{transform:scale(.97)}
  .raterow button small{display:block;font-weight:600;opacity:.75;font-size:11px;margin-top:2px}
  .raterow .rag{background:#3a1a20;color:var(--bad)}
  .raterow .rha{background:var(--bg3);border:1px solid var(--line)}
  .raterow .rgo{background:#173a26;color:var(--ok)}
  .raterow .rea{background:var(--acc);color:#1a1300}
  .cardprog{height:6px;border-radius:3px;background:var(--bg3);overflow:hidden;margin-bottom:14px}
  .cardprog i{display:block;height:100%;background:linear-gradient(90deg,var(--accd),var(--acc))}
  .catpick{display:flex;flex-wrap:wrap;gap:7px;margin:12px 0}
  .catpick button{background:var(--bg3);border:1px solid var(--line);color:var(--txt);border-radius:20px;padding:8px 14px;font-size:12.5px;font-weight:700;cursor:pointer}
  .catpick button.on{background:var(--acc);color:#1a1300;border-color:var(--acc)}
  #toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
  #toast b{color:var(--acc)}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo">LE <span>CLOSING</span></div>
    <div class="hbadges">
      <div class="badge">🔥 <span id="hstreak">0</span></div>
      <div class="badge gold" id="hrank">Stagiaire</div>
    </div>
  </header>
  <div id="ticker"><div class="tkwrap" id="tkin"></div></div>
  <main id="main"></main>
</div>

<div id="ov"><div class="inner" id="ovin"></div></div>
<div id="toast"></div>

<nav><div class="in">
  <button data-v="jour"><i>🎯</i>Jour</button>
  <button data-v="deals"><i>📖</i>Deals</button>
  <button data-v="acad"><i>🎓</i>Académie</button>
  <button data-v="spar"><i>🥊</i>Sparring</button>
  <button data-v="profil"><i>👑</i>Profil</button>
</div></nav>

<script src="data-deals.js"></script>
<script src="data-academy.js"></script>
<script src="data-sparring.js"></script>
<script src="data-lexique.js"></script>
<script src="data-drills.js"></script>
<script src="data-flashcards.js"></script>
<script src="data-feynman.js"></script>
<script>
// ================= ÉTAT =================
const RANKS=[["Stagiaire",0],["Analyst",150],["Associate",400],["VP",800],["Director",1400],["Managing Director",2200],["Rainmaker",3200]];
const KEY="closing_v1";
const DEF={xp:0,streak:0,lastVal:"",done:{deals:[],lessons:[],cases:[],negos:[],teasers:[],cascades:[],plbo:[],feyn:[]},menu:null,rev:[],miss:[],days:[],itv:{runs:0,best:0,runsEN:0,bestEN:0},missions:{},memos:0,memoDraft:{},cards:{}};
let S=load();
function load(){
  let s={};
  try{ s=JSON.parse(localStorage.getItem(KEY))||{}; }catch(e){}
  const o=Object.assign({},DEF,s);
  o.done=Object.assign({},DEF.done,s.done||{});
  o.itv=Object.assign({},DEF.itv,s.itv||{});
  o.rev=s.rev||[]; o.miss=s.miss||[]; o.days=s.days||[];
  o.missions=s.missions||{}; o.memos=s.memos||0; o.memoDraft=s.memoDraft||{};
  o.cards=s.cards||{};
  return o;
}
function save(){ localStorage.setItem(KEY,JSON.stringify(S)); }
function today(){ return new Date().toISOString().slice(0,10); }
function addDays(n){ const d=new Date(Date.now()+n*864e5); return d.toISOString().slice(0,10); }
function yesterday(){ return addDays(-1); }
function esc(x){ return String(x).replace(/</g,"&lt;"); }

function rank(){ let r=RANKS[0]; for(const x of RANKS){ if(S.xp>=x[1]) r=x; } return r; }
function nextRank(){ for(const x of RANKS){ if(S.xp<x[1]) return x; } return null; }
function dispStreak(){ return (S.lastVal===today()||S.lastVal===yesterday()) ? S.streak : 0; }
function addXP(n){
  if(n<=0){save();header();return;}
  const before=rank()[0]; S.xp+=n; save(); header();
  const after=rank()[0];
  if(after!==before) setTimeout(()=>toast("👑 <b>PROMOTION</b> — tu passes <b>"+after+"</b>. Le titre se garde en le méritant chaque jour."),700);
}
function header(){ document.getElementById("hstreak").textContent=dispStreak(); document.getElementById("hrank").textContent=rank()[0]; renderTicker(); }
function renderTicker(){
  const el=document.getElementById("tkin"); if(!el) return;
  const due=cardsDue().length, revN=dueRevs().length, missN=S.miss.length;
  const m=S.menu, dayOk=m&&m.date===today()&&m.validated;
  const items=[
    ["XP",S.xp,""],
    ["GRADE",rank()[0].toUpperCase(),""],
    ["STREAK",dispStreak()+(dispStreak()>0?" ▲":""),dispStreak()>0?"up":"dn"],
    ["JOURNÉE",dayOk?"VALIDÉE ▲":"EN COURS",dayOk?"up":""],
    ["DEALS",S.done.deals.length+"/"+DEALS.length,""],
    ["LEÇONS",S.done.lessons.length+"/"+LESSONS.length,""],
    ["CARTES DUES",due,due>0?"dn":"up"],
    ["RÉVISIONS",revN,revN>0?"dn":"up"],
    ["RATTRAPAGE",missN,missN>0?"dn":"up"],
    ["ENTRETIEN FR",S.itv.best+"/12",""],
    ["ENTRETIEN EN",S.itv.bestEN+"/12",""],
    ["MISSION",S.missions[isoWeek()]?"FAITE ▲":"OUVERTE",S.missions[isoWeek()]?"up":""],
    ["MÉMOS",S.memos,""]
  ];
  const html=items.map(x=>`<span>${x[0]} <b class="${x[2]}">${x[1]}</b></span>`).join("");
  el.innerHTML=html+html; // dupliqué pour la boucle sans couture
}
let toastT=null;
function toast(html){
  const t=document.getElementById("toast");
  t.innerHTML=html; t.classList.add("on");
  clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove("on"),3200);
}

// ================= SPARRING : registre des types =================
const SPAR={
  case:{l:()=>CASES,d:()=>S.done.cases,ico:"🪑",lab:"Sur la sellette"},
  nego:{l:()=>NEGOS,d:()=>S.done.negos,ico:"🤺",lab:"Négociation"},
  teaser:{l:()=>TEASERS,d:()=>S.done.teasers,ico:"🧠",lab:"Brain teaser"},
  cascade:{l:()=>CASCADES,d:()=>S.done.cascades,ico:"📊",lab:"Cascade comptable"},
  plbo:{l:()=>PLBO,d:()=>S.done.plbo,ico:"🧾",lab:"Paper LBO"},
  feyn:{l:()=>FEYNMAN,d:()=>S.done.feyn,ico:"🧒",lab:"Expliqué simplement"}
};
const SPARROT=["case","nego","cascade","teaser","plbo"];
function isoWeek(){
  const d=new Date(); d.setHours(0,0,0,0);
  d.setDate(d.getDate()+3-((d.getDay()+6)%7));
  const w1=new Date(d.getFullYear(),0,4);
  return d.getFullYear()+"-W"+String(1+Math.round(((d-w1)/864e5-3+((w1.getDay()+6)%7))/7)).padStart(2,"0");
}
function weekMission(){
  const wk=isoWeek();
  const n=parseInt(wk.slice(0,4))*53+parseInt(wk.slice(6));
  return {wk, m:MISSIONS[n%MISSIONS.length]};
}

// ================= RÉVISION ESPACÉE (J+3 / J+7 / J+21) =================
const STEPS=[3,7,21];
function scheduleRev(t,id){
  if(!S.rev.find(e=>e.t===t&&e.id===id)) S.rev.push({t,id,step:0,due:addDays(STEPS[0])});
}
function bumpRev(t,id){
  const e=S.rev.find(x=>x.t===t&&x.id===id);
  if(!e||e.due>today()) return;
  e.step++;
  if(e.step>=STEPS.length){ S.rev=S.rev.filter(x=>x!==e); toast("🧠 <b>Acquis.</b> Trois révisions tenues — ce sujet est à toi."); }
  else e.due=addDays(STEPS[e.step]);
}
function dueRevs(){ const t=today(); return S.rev.filter(e=>e.due<=t); }

// ---- Flashcards : échelle SM-2 allégée, indépendante du reste (volume trop grand pour la liste de révisions) ----
const CSTEPS=[1,3,7,16,35,90,180];
function cardsDue(){ const t=today(); return FLASHCARDS.filter(c=>S.cards[c.id]&&S.cards[c.id].due<=t); }
function cardsNew(){ return FLASHCARDS.filter(c=>!S.cards[c.id]); }
function cardsMastered(){ return Object.values(S.cards).filter(c=>c.step>=4).length; }
function rateCardEntry(id,q){
  let c=S.cards[id];
  if(!c){ c=S.cards[id]={step:0,due:today(),seen:0}; }
  c.seen=(c.seen||0)+1;
  if(q===0){ c.step=0; c.due=addDays(1); }
  else if(q===1){ c.due=addDays(Math.max(1,Math.round(CSTEPS[Math.min(c.step,CSTEPS.length-1)]*0.5))); }
  else if(q===2){ c.due=addDays(CSTEPS[Math.min(c.step,CSTEPS.length-1)]); c.step=Math.min(c.step+1,CSTEPS.length-1); }
  else { c.due=addDays(Math.round(CSTEPS[Math.min(c.step+1,CSTEPS.length-1)]*1.3)); c.step=Math.min(c.step+2,CSTEPS.length-1); }
  return [1,2,3,4][q];
}
function revLabel(e){
  if(e.t==="deal"){const d=DEALS.find(x=>x.id===e.id); return d?["📖","Deal — "+d.title]:null;}
  if(e.t==="lesson"){const l=LESSONS.find(x=>x.id===e.id); return l?["🎓","Leçon — "+l.title]:null;}
  if(e.t==="case"){const c=CASES.find(x=>x.id===e.id); return c?["🪑","Cas DAF — "+c.title]:null;}
  if(e.t==="nego"){const n=NEGOS.find(x=>x.id===e.id); return n?["🤺","Négo — "+n.title]:null;}
  if(e.t==="teaser"){const x=TEASERS.find(y=>y.id===e.id); return x?["🧠","Teaser — "+x.cat]:null;}
  if(e.t==="cascade"){const x=CASCADES.find(y=>y.id===e.id); return x?["📊","Cascade — "+x.title]:null;}
  if(e.t==="plbo"){const x=PLBO.find(y=>y.id===e.id); return x?["🧾","Paper LBO — "+x.title]:null;}
  if(e.t==="feyn"){const x=FEYNMAN.find(y=>y.id===e.id); return x?["🧒","Feynman — "+x.title]:null;}
  return null;
}
function openRev(t,id){
  if(t==="deal") return dealQuiz(id);
  if(t==="lesson") return lessonQuiz(id);
  if(t==="teaser") return openTeaser(id);
  if(t==="feyn") return openFeyn(id);
  return openSpar(t,id);
}

// ================= ERREURS / RATTRAPAGE =================
function recMiss(base){ if(!S.miss.includes(base)) S.miss.push(base); }
function missItems(){
  const out=[];
  for(const m of S.miss){
    const [k,id,qi]=m.split("|");
    const src=k==="D"?DEALS.find(d=>d.id===id):LESSONS.find(l=>l.id===id);
    if(src&&src.questions[qi]) out.push({ref:m,q:src.questions[qi],from:(k==="D"?"Deal — ":"Leçon — ")+src.title});
  }
  return out;
}

function nextUndone(list,doneIds){ return list.find(x=>!doneIds.includes(x.id))||list[Math.floor(Math.random()*list.length)]; }
function ensureMenu(){
  const t=today();
  if(S.menu&&S.menu.date===t){
    if(S.menu.dCards===undefined){ S.menu.dCards=false; save(); } // migration des menus d'avant l'ajout des flashcards
    return;
  }
  const doy=Math.floor((new Date()-new Date(new Date().getFullYear(),0,0))/864e5);
  const sparType=SPARROT[doy%SPARROT.length];
  S.menu={date:t,deal:nextUndone(DEALS,S.done.deals).id,lesson:nextUndone(LESSONS,S.done.lessons).id,
    sparType,spar:nextUndone(SPAR[sparType].l(),SPAR[sparType].d()).id,dDeal:false,dLesson:false,dSpar:false,dCards:false,validated:false};
  save();
}
function checkMenu(kind,id){
  const m=S.menu; if(!m||m.date!==today()) return;
  if(kind==="deal"&&id===m.deal) m.dDeal=true;
  if(kind==="lesson"&&id===m.lesson) m.dLesson=true;
  if(kind==="cards") m.dCards=true;
  if(SPAR[kind]&&kind===m.sparType&&id===m.spar) m.dSpar=true;
  if(m.dDeal&&m.dLesson&&m.dSpar&&m.dCards&&!m.validated){
    m.validated=true;
    S.streak=(S.lastVal===yesterday())?S.streak+1:1;
    S.lastVal=today();
    if(!S.days.includes(today())) S.days.push(today());
    addXP(20);
    setTimeout(()=>toast("🔥 <b>Journée validée.</b> Streak : "+S.streak+" (+20 XP)"),400);
  }
  save(); header();
}

const ov=document.getElementById("ov"),ovin=document.getElementById("ovin");
function openOv(html){ ovin.innerHTML=html; ov.classList.add("on"); ov.scrollTop=0; }
function closeOv(){ stopTimer(); ov.classList.remove("on"); render(); }
function ovTop(title,timer){ return `<div class="top"><button class="x" onclick="closeOv()">✕</button><b>${title}</b>${timer?'<span class="timer" id="qtimer">8:00</span>':""}</div>`; }

// ---------- QUIZ ENGINE ----------
let Q=null,TMR=null;
function shuffle(n){ const a=[...Array(n).keys()]; for(let i=n-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
function startQuiz(items,title,onDone,opts){
  Q={items,i:0,good:0,onDone,title,missBase:(opts&&opts.missBase)||null,timed:!!(opts&&opts.timed)};
  if(Q.timed) startTimer(480);
  quizStep();
}
function startTimer(sec){
  stopTimer(); Q.left=sec;
  TMR=setInterval(()=>{
    Q.left--;
    const el=document.getElementById("qtimer");
    if(el){ el.textContent=Math.floor(Q.left/60)+":"+String(Q.left%60).padStart(2,"0"); if(Q.left<=60) el.classList.add("low"); }
    if(Q.left<=0){ stopTimer(); if(Q&&Q.onDone){ const cb=Q.onDone; const g=Q.good,t=Q.items.length; Q=null; cb(g,t,true); } }
  },1000);
}
function stopTimer(){ if(TMR){clearInterval(TMR);TMR=null;} }
function quizStep(){
  const q=Q.items[Q.i];
  Q.map=shuffle(q.opts.length);
  openOv(ovTop(Q.title,Q.timed)+`
    <div class="prog">Question ${Q.i+1}/${Q.items.length}${Q.from?` — <span style="color:var(--acc)">${Q.from}</span>`:""}</div>
    ${q.from?`<div class="prog" style="margin-top:-6px">${q.from}</div>`:""}
    <div class="qq">${q.q}</div>
    ${Q.map.map((oi,pos)=>`<button class="opt" onclick="answer(${pos})">${q.opts[oi]}</button>`).join("")}
    <div id="qexp"></div>`);
  if(Q.timed&&Q.left!=null){const el=document.getElementById("qtimer");if(el){el.textContent=Math.floor(Q.left/60)+":"+String(Q.left%60).padStart(2,"0");if(Q.left<=60)el.classList.add("low");}}
}
function answer(pos){
  const q=Q.items[Q.i],orig=Q.map[pos],ok=orig===q.a;
  if(ok){ Q.good++; if(q.ref){ S.miss=S.miss.filter(m=>m!==q.ref); save(); } }
  else if(Q.missBase){ recMiss(Q.missBase(Q.i)); save(); }
  else if(q.ref){ /* rattrapage raté : la question reste */ }
  document.querySelectorAll(".opt").forEach((b,k)=>{
    b.disabled=true;
    if(Q.map[k]===q.a) b.classList.add("ok");
    else if(k===pos) b.classList.add("ko");
  });
  document.getElementById("qexp").innerHTML=`<div class="exp"><b style="color:${ok?"var(--ok)":"var(--bad)"}">${ok?"Exact.":"Non."}</b> ${q.exp}</div>
    <button class="btn" onclick="quizNext()">${Q.i+1<Q.items.length?"Question suivante":"Voir le verdict"}</button>`;
}
function quizNext(){ Q.i++; if(Q.i<Q.items.length) quizStep(); else { stopTimer(); const cb=Q.onDone,g=Q.good,t=Q.items.length; Q=null; cb(g,t,false); } }

function quizVerdict(good,total,xp,extra){
  const pct=good/total;
  const verdict=pct===1?"Sans faute.":pct>=0.75?"Solide.":pct>=0.5?"Moyen. En entretien, « moyen » élimine.":"Insuffisant. Tes erreurs sont dans le Rattrapage — elles t'attendent.";
  openOv(ovTop("Verdict")+`
    <div class="result">
      <div class="big">${good}/${total}</div>
      <div class="xp">+${xp} XP</div>
      <p>${verdict}${extra||""}</p>
    </div>
    <button class="btn" onclick="closeOv()">Continuer</button>`);
}

let CS=null; // {queue, i, revealed, catFilter, startCount}
function openCardIntro(){
  const cd=cardsDue().length, cn=cardsNew().length, cm=cardsMastered();
  openOv(ovTop("Flashcards")+`
    <div class="qq" style="margin-top:6px">${FLASHCARDS.length} cartes — vocabulaire, multiples sectoriels, réalité du métier.</div>
    <div class="coach">${cd?`<b>${cd} carte${cd>1?"s":""} due${cd>1?"s":""}</b> aujourd'hui — la répétition espacée a fait son calcul, c'est le moment de les revoir.`:cn?`Aucune carte due. ${cn} carte${cn>1?"s":""} jamais vue${cn>1?"s":""} — découvre-en jusqu'à 15 par session.`:"Tout est à jour. Reviens quand une carte sera due."} ${cm?` ${cm} déjà maîtrisée${cm>1?"s":""}.`:""}</div>
    <p class="sub" style="margin:14px 0 6px">Choisis un thème, ou mélange tout :</p>
    ${cardPickerHtml()}`);
}
function startCardSession(catFilter){
  const due=cardsDue().map(c=>c.id);
  const seen=new Set(due);
  let pool=catFilter?FLASHCARDS.filter(c=>c.cat===catFilter):FLASHCARDS;
  const newIds=pool.filter(c=>!S.cards[c.id]&&!seen.has(c.id)).map(c=>c.id);
  const dueFiltered=catFilter?due.filter(id=>pool.find(c=>c.id===id)):due;
  const shuffled=a=>{a=[...a];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;};
  const queue=[...shuffled(dueFiltered),...shuffled(newIds).slice(0,15)];
  if(!queue.length){
    if(!catFilter) checkMenu("cards"); // rien de dû ni de nouveau : l'exercice du jour est réputé fait
    openOv(ovTop("Flashcards")+`
      <div class="result"><div class="big">✓</div><p>Rien à réviser pour l'instant${catFilter?" dans « "+catFilter+" »":""}. ${cardsNew().length?"":"Tu as vu les "+FLASHCARDS.length+" cartes au moins une fois — la répétition espacée fait le reste, reviens quand une carte sera due."}</p></div>
      <button class="btn ghost" onclick="closeOv()">Fermer</button>`);
    return;
  }
  CS={queue,i:0,revealed:false,catFilter,startCount:queue.length,good:0};
  cardStep();
}
function cardPickerHtml(){
  const cats=["Lexique","Multiples","IPO","LBO","Realite"];
  const labels={Lexique:"Lexique",Multiples:"Multiples",IPO:"IPO",LBO:"LBO",Realite:"Réalité du métier"};
  return `<div class="catpick">${cats.map(c=>`<button onclick="startCardSession('${c}')">${labels[c]}</button>`).join("")}<button onclick="startCardSession()">Tout mélanger</button></div>`;
}
function cardStep(){
  if(CS.i>=CS.queue.length) return cardSessionEnd();
  const c=FLASHCARDS.find(x=>x.id===CS.queue[CS.i]);
  CS.revealed=false;
  CS.reversed=Math.random()<0.5 && !!S.cards[c.id]; // cartes déjà vues : parfois on inverse le sens, comme les cartes "reversed" d'Anki
  const front=CS.reversed?c.verso:c.recto;
  const frontIsLong=CS.reversed;
  openOv(ovTop("Flashcards")+`
    <div class="prog">Carte ${CS.i+1}/${CS.queue.length}${c.sub?` — ${c.sub}`:""}</div>
    <div class="cardprog"><i style="width:${Math.round(CS.i/CS.queue.length*100)}%"></i></div>
    <div class="cardbox" onclick="flipCard()">
      <div class="side">${CS.reversed?"Définition → trouve le terme":"Terme → définition"}</div>
      <div class="txt ${frontIsLong?"def":""}">${front}</div>
      <div class="hint">Touche la carte pour retourner</div>
    </div>`);
}
function flipCard(){
  if(CS.revealed) return;
  CS.revealed=true;
  const c=FLASHCARDS.find(x=>x.id===CS.queue[CS.i]);
  const front=CS.reversed?c.verso:c.recto;
  const back=CS.reversed?c.recto:c.verso;
  const backIsLong=!CS.reversed;
  document.querySelector(".cardbox").outerHTML=`
    <div class="cardbox">
      <div class="cardq">${front}</div>
      <div class="txt ${backIsLong?"def":""}">${back}</div>
    </div>`;
  const div=document.createElement("div");
  div.className="raterow";
  div.innerHTML=`
    <button class="rag" onclick="rateCard(0)">Oublié<small>revoir demain</small></button>
    <button class="rha" onclick="rateCard(1)">Difficile<small>bientôt</small></button>
    <button class="rgo" onclick="rateCard(2)">Bien<small>intervalle normal</small></button>
    <button class="rea" onclick="rateCard(3)">Facile<small>on saute plus loin</small></button>`;
  document.getElementById("ovin").appendChild(div);
}
function rateCard(q){
  const c=FLASHCARDS.find(x=>x.id===CS.queue[CS.i]);
  rateCardEntry(c.id,q); save();
  if(q>=2) CS.good++;
  addXP(q+1);
  CS.i++;
  cardStep();
}
function cardSessionEnd(){
  checkMenu("cards");
  const pct=CS.startCount?Math.round(CS.good/CS.startCount*100):0;
  const msg=pct>=80?"Mémoire solide sur cette session. C'est exactement l'effet recherché : la répétition espacée qui tient.":
    pct>=50?"Correct. Les cartes ratées reviendront vite — c'est voulu, pas punitif.":
    "Beaucoup d'oublis, et c'est normal en phase de découverte. Elles reviendront demain ; à ce rythme, elles finiront par tenir.";
  openOv(ovTop("Session terminée")+`
    <div class="result">
      <div class="big">${CS.startCount}</div>
      <div class="xp">cartes travaillées</div>
      <p>${msg}</p>
    </div>
    ${cardPickerHtml()}
    <button class="btn ghost" onclick="closeOv()">Fermer</button>`);
  CS=null;
}

  LESSONS.forEach(l=>l.questions.forEach((q,i)=>pool.push(Object.assign({},q,{from:"Leçon — "+l.title,base:"L|"+l.id+"|"+i}))));
  const picked=pool.sort(()=>Math.random()-.5).slice(0,12);

function launchInterview(bases){
  const items=bases.map(b=>{
    const [k,id,qi]=b.split("|");
    const src=k==="D"?DEALS.find(d=>d.id===id):LESSONS.find(l=>l.id===id);
    return Object.assign({},src.questions[qi],{from:(k==="D"?"Deal — ":"Leçon — ")+src.title});

  let idx=0;
  startQuiz(items,"Entretien",(good,total,timedOut)=>{
    S.itv.runs++; if(good>S.itv.best) S.itv.best=good;
    const xp=good*3; addXP(xp); save();
    const v=timedOut?"Temps écoulé — en entretien aussi, le silence compte comme une mauvaise réponse.":
      good>=11?"Offre. On te rappelle avant les autres.":
      good>=9?"Tour suivant. Solide, pas parfait — un associé t'aurait poussé sur les ratées.":
      good>=6?"Repêchage incertain. La moitié du métier te résiste encore.":
      "Recalé. En vrai entretien, on t'aurait arrêté à la question 6. Retour à l'Académie, puis reviens.";
    openOv(ovTop("Verdict du recruteur")+`
      <div class="result">
        <div class="big">${good}/${total}</div>
        <div class="xp">+${xp} XP${good===S.itv.best&&good>0?" · record":""}</div>
        <p>${v}</p>
      </div>
      <button class="btn" onclick="startInterview()">Nouvel entretien</button>
      <button class="btn ghost" onclick="closeOv()">Sortir</button>`);
  },{timed:true,missBase:i=>{
    const [k,id,qi]=bases[i].split("|"); return k+"|"+id+"|"+qi;
  }});
}

// ---------- LE MÉMO DU DIMANCHE ----------
const MEMO_SECTIONS=[
  ["Société & thèse","La société analysée, et ta thèse en 2 phrases : pourquoi elle mérite (ou non) qu'on y mette de l'argent."],
  ["Le business","Ce qu'elle vend, à qui, avec quel avantage compétitif. Le pricing power en une phrase."],
  ["Les chiffres","CA, croissance, marge d'EBITDA, dette nette/EBITDA, conversion en cash. Les 5 chiffres qui comptent, sourcés."],
  ["Valorisation","Multiple actuel vs comparables, et ton estimation : chère, correcte, décotée ? Justifie."],
  ["Risques","Les 3 risques majeurs — les vrais, pas ceux de la plaquette."],
  ["Verdict","Achat, vente, ou passe. Une position ferme et son niveau de conviction. Le flou est interdit ici plus qu'ailleurs."]
];
function openMemo(){
  openOv(ovTop("Le mémo du dimanche")+`
    <div class="coach">Une page, une vraie société, une position ferme. Rédige chaque section, puis exporte : tu le colles à ton coach (Claude) pour une correction d'associé — c'est la partie qui te fait progresser. Brouillon sauvegardé automatiquement.</div>
    ${MEMO_SECTIONS.map((s,i)=>`
      <p class="sub" style="margin:12px 0 4px"><b style="color:var(--acc)">${i+1}. ${s[0]}</b> — ${s[1]}</p>
      <textarea style="min-height:70px" oninput="saveMemoField(${i},this.value)" id="memo${i}">${esc(S.memoDraft[i]||"")}</textarea>`).join("")}
    <button class="btn" onclick="finishMemo()">Assembler & copier le mémo (+40 XP)</button>
    <button class="btn ghost" onclick="closeOv()">Fermer (brouillon conservé)</button>`);
}
function saveMemoField(i,v){ S.memoDraft[i]=v; save(); }
function finishMemo(){
  const parts=MEMO_SECTIONS.map((s,i)=>(S.memoDraft[i]||"").trim());
  const totalLen=parts.join("").length;
  const empty=parts.filter(p=>p.length<40).length;
  if(empty>0||totalLen<600){ toast("❌ <b>Mémo incomplet.</b> Chaque section ≥ 40 caractères, 600 au total. Un mémo à moitié écrit est un mémo qu'on ne lit pas."); return; }
  const txt="MÉMO D'INVESTISSEMENT — "+new Date().toLocaleDateString("fr-FR")+"\n\n"+MEMO_SECTIONS.map((s,i)=>s[0].toUpperCase()+"\n"+parts[i]).join("\n\n")+"\n\n— Rédigé dans LE CLOSING. Coach : corrige-moi ce mémo comme un associé le ferait.";
  const doneMsg=()=>{ S.memos++; S.memoDraft={}; addXP(40); save();
    openOv(ovTop("Mémo n°"+S.memos+" assemblé")+`
      <div class="result"><div class="big">📝</div><div class="xp">+40 XP</div>
      <p>Copié dans le presse-papiers. Maintenant la vraie étape : <b>colle-le à ton coach</b> et encaisse la correction. Un mémo non soumis est un monologue.</p></div>
      <button class="btn" onclick="closeOv()">Continuer</button>`); };
  if(navigator.clipboard&&navigator.clipboard.writeText) navigator.clipboard.writeText(txt).then(doneMsg,()=>{prompt("Copie ton mémo :",txt);doneMsg();});
  else { prompt("Copie ton mémo :",txt); doneMsg(); }
}

// ---------- INTERVIEW IN ENGLISH ----------
function startInterviewEN(){
  openOv(ovTop("Interview in English")+`
    <div class="qq" style="margin-top:6px">12 questions. 8 minutes. In English — like half your real interviews.</div>
    <div class="coach">Classic investment banking interview questions, in the original language. Read fast, think faster. <b>The clock starts when you click.</b></div>
    <button class="btn" onclick="launchInterviewEN()">I'm ready</button>`);
}
function launchInterviewEN(){
  const items=[...ENGQ].sort(()=>Math.random()-.5).slice(0,12);
  startQuiz(items,"English interview",(good,total,timedOut)=>{
    S.itv.runsEN++; if(good>S.itv.bestEN) S.itv.bestEN=good;
    const xp=good*3; addXP(xp); save();
    const v=timedOut?"Time's up — in a real interview, silence counts as a wrong answer.":
      good>=11?"Offer. They'll call you before the others.":
      good>=9?"Next round. Solid, not flawless — a VP would have pushed on the misses.":
      good>=6?"Borderline. Half the technicals still resist you.":
      "Rejected. They stopped listening at question six. Back to the Academy — in both languages.";
    openOv(ovTop("Recruiter's verdict")+`
      <div class="result">
        <div class="big">${good}/${total}</div>
        <div class="xp">+${xp} XP${good===S.itv.bestEN&&good>0?" · best":""}</div>
        <p>${v}</p>
      </div>
      <button class="btn" onclick="startInterviewEN()">Run it again</button>
      <button class="btn ghost" onclick="closeOv()">Exit</button>`);
  },{timed:true});
}
